<!doctype html>
<!--suppress ALL -->
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <title>House Price Predictor</title>
  </head>
  <body class="bg-dark">
    <div class="container">
        <div class="row">
            <div class="card" style="width: 100%; height:100%; margin-top: 50px">
                <div class="card-header" style="text-align: center">
                    <h1>This is Bangalore House Price Predictor</h1>
                </div>
                <div class="card-body">
                    <form method="post" accept-charset="utf-8">

                        <div class="col-md-6 form group" style="text-align: center">
                            <label><b>Select the location</b></label>
                            <select class="select picker form-control" id="location" name="location" required = "1">
                                {% for location in locations %}
                                    <option value="{{ location }}">{{ location }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 form group" style="text-align: center">
                            <label><b>Enter the BHK</b></label>
                            <input type="text" class="form-control" id="bhk" name="bhk" placeholder="Enter BHK">
                        </div>

                        <div class="col-md-6 form group" style="text-align: center">
                            <label><b>Enter the Bathroom</b></label>
                            <input type="text" class="form-control" id="bathroom" name="bathroom" placeholder="Enter no.of Bathroom">
                        </div>

                        <div class="col-md-6 form group" style="text-align: center">
                            <label><b>Enter Total Square FeetK</b></label>
                            <input type="text" class="form-control" id="square_feet" name="square_feet" placeholder="Enter Square Feet">
                        </div>

                        <div class="col-md-12 form group">
                            <button class="btn btn-primary form-control">Predict Price</button>

<!--                            <button class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>-->

                        </div>

                    </form>

                    <br>

                    <div class="col-md-12" style="text-align: Center">
                        <h3><span id="prediction"></span></h3>
                    </div>

                </div>
            </div>

        </div>

    </div>



    <script>
        document.querySelector('form').addEventListener("submit", function(event) {
            event.preventDefault(); // Prevents the page from reloading/default POST

            var fd = new FormData(this);
            var xhr = new XMLHttpRequest();

            document.getElementById("prediction").innerHTML = "Wait, Predicting Price...!";

            xhr.open('POST', '/predict', true);

            xhr.onreadystatechange = function() {
                if (xhr.readyState === XMLHttpRequest.DONE) {
                    if (xhr.status === 200) { // Changed from True to 200
                        document.getElementById("prediction").innerHTML = "Prediction: ₹" + xhr.responseText + " Lakhs";
                    }
                    else {
                        document.getElementById("prediction").innerHTML = "Error: " + xhr.status;
                    }
                }
            };

            xhr.send(fd);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </body>
</html>
